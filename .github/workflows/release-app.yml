name: Release app

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create/publish as draft release'
        required: true
        default: false
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Windows release assets
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - run: yarn install:ci

      - run: yarn build

      - name: Package Windows updater assets
        run: yarn electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify updater assets
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          test -f dist/latest.yml
          find dist -maxdepth 1 -name 'Octob-Setup-*.exe' | grep .
          find dist -maxdepth 1 -name 'Octob-Setup-*.exe.blockmap' | grep .

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: octob-windows-release-assets
          path: |
            dist/latest.yml
            dist/Octob-Setup-*.exe
            dist/Octob-Setup-*.exe.blockmap
          if-no-files-found: error

  build-linux:
    name: Linux release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - run: yarn install:ci
      - run: yarn build

      - name: Package Linux release assets
        run: yarn electron-builder --linux --publish never

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: octob-linux-release-assets
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
          if-no-files-found: error

  build-macos:
    name: macOS release assets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - run: yarn install:ci
      - run: yarn build

      - name: Package unsigned macOS release assets
        run: yarn electron-builder --mac --publish never -c.mac.notarize=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: octob-macos-release-assets
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: octob-windows-release-assets
          path: release-assets

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: octob-linux-release-assets
          path: release-assets

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: octob-macos-release-assets
          path: release-assets

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build-windows.outputs.tag }}
          VERSION: ${{ needs.build-windows.outputs.version }}
          DRAFT: ${{ inputs.draft || 'false' }}
          PRERELEASE: ${{ inputs.prerelease || 'false' }}
        run: |
          set -euo pipefail
          ls -la release-assets/

          RELEASE_FLAGS=()
          if [ "$DRAFT" = "true" ]; then
            RELEASE_FLAGS+=(--draft)
          fi
          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" "${RELEASE_FLAGS[@]}"
          else
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Octob ${VERSION}" \
              --notes "Octob ${VERSION}" \
              "${RELEASE_FLAGS[@]}"
          fi
